version: "3.9"

services:

  db:
    image: postgres:16-alpine
    container_name: aiyl-bank-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aiylbank
      POSTGRES_USER: aiyl
      POSTGRES_PASSWORD: aiyl123
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiyl -d aiylbank"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: aiyl-bank-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: aiylbank
      DB_USER: aiyl
      DB_PASSWORD: aiyl123

volumes:
  pg_data:
